# ============================================================
# YOLO红绿灯检测节点参数配置文件
# ============================================================
# 修改此文件后重启节点即可生效，无需重新编译
# 启动命令：roslaunch traffic_light_yolo traffic_light_yolo.launch
# 注意：此处值为推荐值，代码默认值在括号中标注

# ============================================================
# 摄像头参数
# ============================================================
camera_fov: 93.4           # 水平视场角（度），代码默认值：93.4
                           # 根据摄像头规格调整，影响角度计算精度

angle_offset: 0.0          # 摄像头与雷达安装角度偏移补偿（度），代码默认值：0.0
                           # 正值：向右补偿，负值：向左补偿
                           # 摄像头前移18cm，在2m距离时约产生5°误差
                           # 校准方法：见文件末尾说明

# ============================================================
# 检测去抖参数
# ============================================================
debounce_window: 5        # 去抖历史窗口大小（帧数），代码默认值：10
                           # 保存最近N帧的检测结果用于去抖

debounce_threshold: 5      # 确认状态所需的最小连续帧数，代码默认值：8
                           # 在debounce_window帧内至少出现threshold次才确认
                           # 值越大越稳定，但响应越慢

max_lost_frames: 3         # 允许连续丢失的最大帧数，代码默认值：3
                           # 检测丢失超过此帧数后才清除确认状态
                           # 防止短暂遮挡导致状态丢失

# ============================================================
# 角度滤波参数
# ============================================================
angle_filter_alpha: 0.3    # 角度低通滤波权重（0-1），代码默认值：0.3
                           # 新值权重，越小越平滑，响应越慢
                           # filtered = alpha * new + (1-alpha) * old
                           # 推荐值：0.2-0.4

# ============================================================
# 距离测量参数
# ============================================================
scan_window_half: 10        # 雷达采样窗口半宽（索引数），代码默认值：5
                           # 在目标角度±window范围内采样
                           # 越大越稳定，但可能包含无关障碍物
                           # 推荐值：5-10

distance_window_size: 5   # 距离历史窗口大小（帧数），代码默认值：5
                           # 用于中值滤波，越大越平滑
                           # 推荐值：5-15

max_distance_jump: 0.3     # 相邻帧最大允许距离跳变（米），代码默认值：1.0
                           # 防止突变，超过此值则限幅
                           # 值越小越稳定，但可能限制快速变化
                           # 推荐值：0.3-1.0

# ============================================================
# 时间同步参数
# ============================================================
max_time_diff: 0.3         # 图像与雷达最大允许时间差（秒），代码默认值：0.1
                           # 超过此值则认为数据不同步，不进行测距
                           # 推荐值：0.05-0.2

# ============================================================
# 校准说明
# ============================================================
#
# 【angle_offset 校准步骤】
# 1. 将小车停在距离红绿灯 2.0米 处（用卷尺精确测量）
# 2. 启动节点：roslaunch traffic_light_yolo traffic_light_yolo.launch
# 3. 观察终端输出的测距值
# 4. 调整 angle_offset：
#    - 如果测量距离 > 真实距离 → angle_offset 增大
#    - 如果测量距离 < 真实距离 → angle_offset 减小
# 5. 在多个距离点（1m, 2m, 3m, 4m）重复测试
# 6. 找到最佳折衷值（各距离误差最小）
#
# 【距离波动大的解决方法】
# - 增大 distance_window_size（如15-20）
# - 减小 angle_filter_alpha（如0.2）
# - 增大 scan_window_half（如10-15）
# - 减小 max_distance_jump（如0.3）
#
# 【远距离测不准的解决方法】
# - 增大 scan_window_half
# - 检查雷达最大测距范围
# - 确认红绿灯在雷达扫描平面内
#
# 【检测不稳定的解决方法】
# - 增大 debounce_threshold
# - 增大 debounce_window
# - 增大 max_lost_frames
#
# 【响应太慢的解决方法】
# - 减小 debounce_threshold（如5-6）
# - 减小 distance_window_size（如5-7）
# - 增大 angle_filter_alpha（如0.4-0.5）
