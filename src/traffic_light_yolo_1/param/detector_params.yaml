# ============================================================
# YOLO红绿灯检测节点参数配置文件
# ============================================================
# 修改此文件后重启节点即可生效，无需重新编译
# 启动命令：roslaunch traffic_light_yolo_1 traffic_light_yolo_1.launch
# 注意：此处值为推荐值，代码默认值在括号中标注

# ============================================================
# 摄像头参数
# ============================================================
camera_fov: 93.4           # 水平视场角（度），代码默认值：93.4
                           # 根据摄像头规格调整，影响角度计算精度

angle_offset: 0.0          # 摄像头与雷达安装角度偏移补偿（度），代码默认值：0.0
                           # 正值：向右补偿，负值：向左补偿
                           # 校准方法：见文件末尾说明

# ============================================================
# YOLO 置信度阈值
# ============================================================
conf_threshold: 0.45       # 最低检测置信度，代码默认值：0.45
                           # 低于此值的检测框直接忽略，避免弱检测污染去抖历史
                           # 推荐值：0.35-0.55
                           # 若漏检严重可降至 0.35；若误检严重可升至 0.55

# ============================================================
# 检测去抖参数
# ============================================================
debounce_window: 5         # 去抖历史窗口大小（帧数），代码默认值：5
                           # 保存最近N帧的检测结果用于投票

debounce_threshold: 3      # 确认状态所需的最小帧数，代码默认值：3
                           # 在 debounce_window 帧内至少出现 threshold 次才确认
                           # 3/5 = 60%，响应快且抗单帧误检
                           # 若误检多可升至 4；若漏检多可降至 2

max_lost_frames: 5         # 允许连续丢失的最大帧数，代码默认值：5
                           # 检测丢失超过此帧数后才清除确认状态
                           # 短暂遮挡或漏帧时保持灯态更久，推荐值：3-8

# ============================================================
# 角度滤波参数
# ============================================================
angle_filter_alpha: 0.5    # 角度低通滤波权重（0-1），代码默认值：0.5
                           # 新值权重，越大响应越快，越小越平滑
                           # filtered = alpha * new + (1-alpha) * old
                           # 推荐值：0.4-0.6（0.3偏慢会导致角度滞后，测距误差增大）

# ============================================================
# 距离测量参数
# ============================================================
scan_window_half: 5        # 雷达采样窗口半宽（索引数），代码默认值：5
                           # 以角度对应索引为中心，取 ±scan_window_half 范围内
                           # 所有有效点的最小值作为距离（最近点即灯体本身）
                           # 增大可提高单点失效时的容错，推荐值：3-8
                           # 注意：窗口过大会把背景障碍物也纳入，反而不准

distance_window_size: 7    # 距离历史窗口大小（帧数），代码默认值：7
                           # 用于跨帧中值滤波，越大越平滑，推荐值：5-10

max_distance_jump: 0.8     # 相邻帧最大允许距离跳变（米），代码默认值：0.8
                           # 防止噪声突变；小车靠近时距离快速减小，需足够大
                           # 0.3m过小（3-4km/h的小车每帧可变化0.1-0.2m）
                           # 推荐值：0.5-1.0

# ============================================================
# 时间同步参数
# ============================================================
max_time_diff: 0.3         # 图像与雷达最大允许时间差（秒），代码默认值：0.3
                           # 嵌入式设备时钟同步可能有100-200ms偏差，0.1s过严
                           # 推荐值：0.2-0.4

# ============================================================
# 发布频率说明
# ============================================================
# /traffic_light_detection 的发布频率 = YOLO推理帧率（FPS）
# 每帧图像处理完成后立即发布一次，频率完全取决于YOLO推理速度：
#
#   YOLOv8n (nano)  ：Jetson Nano  15-25 Hz，Jetson Xavier NX  25-40 Hz
#   YOLOv8s (small) ：Jetson Nano   8-15 Hz，Jetson Xavier NX  15-25 Hz
#   YOLOv8m (medium)：Jetson Nano   3-8  Hz
#
# 查看实际频率（终端每秒打印一次）：
#   [INFO] Light: RED    Angle: -3.2°  Distance: 2.35 m  FPS: 12.4
# 或：
#   rostopic hz /traffic_light_detection
#
# 导航状态机以 10 Hz 轮询该话题，整体响应延迟约：
#   delay ≈ debounce_threshold / FPS + 0.1s
#   例：FPS=12, threshold=3 → 3/12 + 0.1 ≈ 0.35s

# ============================================================
# 校准说明
# ============================================================
#
# 【angle_offset 校准步骤】
# 1. 将小车停在距离红绿灯 2.0米 处（用卷尺精确测量）
# 2. 启动节点：roslaunch traffic_light_yolo_1 traffic_light_yolo_1.launch
# 3. 观察终端输出的 Angle 和 Distance
# 4. 调整 angle_offset：
#    - 测量距离 > 真实距离 → angle_offset 增大（雷达指向偏左）
#    - 测量距离 < 真实距离 → angle_offset 减小（雷达指向偏右）
# 5. 在多个距离点（1m, 2m, 3m, 4m）重复测试，取最佳折衷值
#
# 【检测不灵敏（漏检多）的解决方法】
# - 降低 conf_threshold（如 0.35）
# - 降低 debounce_threshold（如 2）
# - 增大 max_lost_frames（如 8）
#
# 【误检多（频繁抖动）的解决方法】
# - 提高 conf_threshold（如 0.55）
# - 提高 debounce_threshold（如 4）
# - 降低 max_lost_frames（如 3）
#
# 【距离波动大的解决方法】
# - 增大 distance_window_size（如 10-15）
# - 减小 max_distance_jump（如 0.5）
# - 减小 angle_filter_alpha（如 0.3）减缓角度变化
#
# 【距离频繁返回 inf 的解决方法】
# - 增大 scan_window_half（如 8-10）
# - 增大 max_time_diff（如 0.5）
# - 检查雷达与摄像头 ROS 时钟是否对齐
#
# 【测距偏大（距离系统性偏高）的解决方法】
# - 检查 angle_offset 是否正确（角度偏了会打到背景）
# - 适当减小 scan_window_half（减少背景点干扰）
