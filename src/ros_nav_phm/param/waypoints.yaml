# waypoints.yaml
# 多点导航路径配置
#
# waypoints: 导航目标点列表（map坐标系，单位：米）
#   - 中间途经点不填 yaw，小车到达后保持当前朝向直接继续
#   - 最后一个点填 yaw，控制小车停止时的朝向（弧度）
#
# via_points: 每段路径的中间约束点，索引与 waypoints 一一对应
#   - 留空列表 [] 表示该段无约束，TEB 自由规划
#   - 转弯处建议多加几个点，点间距 0.3~0.5m
#   - 约束强度在 teb_local_planner_params.yaml 的 weight_viapoint 调整

traffic_light_stop_points: [8, 11]  # 红绿灯停止点索引示例

waypoints:
  - {x: 0.6, y: -0.1, yaw: -0.3}    # 0: 启航点（占位符）
  - {x: 1.2, y: -0.3,yaw: -0.3}              # 1: 拐点后（占位符）
  - {x: 2.5, y: -0.3, yaw: -0.3}              # 2: 直道点（占位符）
  - {x: 3.6, y: -0.3, yaw: -0.3}              # 3: 直道点（占位符）
  - {x: 4.15, y: -0.3, yaw: -0.3}              # 4: 直道点（占位符）
  - {x: 4.35, y: -0.3, yaw: -0.8}              # 5: 拐点前（占位符）      
  - {x: 4.6, y: -0.8, yaw: -1.9}              # 6: 拐点后（占位符）
  - {x: 4.6, y: -1.8, yaw: -1.9}              # 7直走
  - {x: 4.35, y: -2.9, yaw: -1.9}              # 8: 拐点前（占位符）（红绿灯监测点）x
  - {x: 3.6, y: -3.1, yaw: 3.1}              # 9: 拐点后（占位符）
  - {x: 2.8, y: -3.3, yaw: 3.1}             # 直走 10
  - {x: 2.0, y: -2.8, yaw: 3.1}              # 11: 通道入口（占位符）（红绿灯检测点）O
  - {x: 2.0, y: -1.6, yaw: 1.4}              # 12: 通道中间点（占位符）
  - {x: 1.6, y: -0.7, yaw: 2.9}              # 13: 通道出口点（占位符）
  - {x: 0.8, y: -0.46, yaw: 2.9}              # 14: 返回点（占位符）
  - {x: -0.2, y: -0.4, yaw: -0.3}    # 15: 终点，指定朝向（占位符）

via_points:
  - []                             # 前往 waypoint 0
  - []                             # 前往 waypoint 1（占位符，填入实际中间点）
  - []                             # 前往 waypoint 2（占位符）
  - []                             # 前往 waypoint 3（占位符，路口转弯处建议多加点）
  - []                             # 前往 waypoint 4（占位符）
  - []                             # 前往 waypoint 5（占位符）
  - []                             # 前往 waypoint 6（占位符）
  - []                             # 前往 waypoint 7（占位符）
  - []                             # 前往 waypoint 8（占位符）
  - []                             # 前往 waypoint 9（占位符）
  - []                             # 前往 waypoint 10（占位符）
  - []                             # 前往 waypoint 11（占位符）
  - []                              # 前往 waypoint 12（占位符）
  - []                              # 前往 waypoint 13（占位符）
# 示例（取消注释后替换上面的内容）：
#
# waypoints:
#   - {x: 0.5, y: 0.3}
#   - {x: 1.2, y: 0.3}
#   - {x: 2.0, y: 0.3}
#   - {x: 2.0, y: 1.5}
#   - {x: 0.0, y: 0.0, yaw: 0.0}
#
# via_points:
#   - []
#   - [{x: 0.8, y: 0.3}]
#   - [{x: 1.6, y: 0.3}]
#   - [{x: 2.0, y: 0.6}, {x: 2.0, y: 1.0}]
#   - [{x: 1.5, y: 1.5}, {x: 0.8, y: 1.0}]